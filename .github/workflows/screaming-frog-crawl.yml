name: Screaming Frog weekly crawl

on:
  schedule:
    - cron: '0 7 * * 1'  # tous les lundis à 7h UTC (9h Paris)
  workflow_dispatch:      # permet aussi de lancer à la main depuis GitHub

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Screaming Frog CLI
        run: |
          DEB_URL=$(curl -sI "https://download.screamingfrog.co.uk/products/seo-spider/screamingfrogseospider_latest_all.deb" \
            | grep -i '^location:' | awk '{print $2}' | tr -d '\r\n')
          DEB_FILE=$(basename "$DEB_URL")
          echo "Téléchargement : $DEB_FILE"
          wget -q "$DEB_URL" -O "$DEB_FILE"
          sudo apt-get install -y "./$DEB_FILE"

      - name: Activate Screaming Frog licence and accept EULA
        run: |
          mkdir -p ~/.ScreamingFrogSEOSpider
          printf '%s\n%s\n' "${{ secrets.SF_LICENSE_USERNAME }}" "${{ secrets.SF_LICENSE_KEY }}" \
            > ~/.ScreamingFrogSEOSpider/licence.txt
          echo "eula.accepted=15" > ~/.ScreamingFrogSEOSpider/spider.config

      - name: Run crawl
        run: |
          CRAWL_DATE=$(date +%Y-%m-%d)
          mkdir -p results/${CRAWL_DATE}
          screamingfrogseospider \
            --headless \
            --crawl http://spilou.com/ \
            --save-report "Crawl Overview" \
            --output-folder results/${CRAWL_DATE}

      - name: Add crawl_date column and clean headers for BigQuery
        run: |
          CRAWL_DATE=$(date +%Y-%m-%d)
          cat > /tmp/process_csv.py << 'PYEOF'
          import csv, re, sys
          crawl_date, csv_file, out_file = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(csv_file, newline='', encoding='utf-8-sig') as fin, \
               open(out_file, 'w', newline='', encoding='utf-8') as fout:
              reader = csv.reader(fin)
              writer = csv.writer(fout)
              headers = next(reader)
              clean = ['crawl_date'] + [
                  re.sub(r'_+', '_', re.sub(r'[^a-zA-Z0-9]', '_', h)).strip('_')
                  for h in headers
              ]
              writer.writerow(clean)
              for row in reader:
                  writer.writerow([crawl_date] + row)
          PYEOF
          python3 /tmp/process_csv.py \
            "$CRAWL_DATE" \
            "results/${CRAWL_DATE}/crawl_overview.csv" \
            "results/${CRAWL_DATE}/crawl_overview.dated.csv"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to BigQuery
        run: |
          CRAWL_DATE=$(date +%Y-%m-%d)
          bq load \
            --autodetect \
            --source_format=CSV \
            --skip_leading_rows=1 \
            "githubactions-493011:screaming_frog_alma.alma" \
            "results/${CRAWL_DATE}/crawl_overview.dated.csv"

      - name: Commit results to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/
          git commit -m "crawl SF $(date +%Y-%m-%d)" || echo "rien de nouveau"
          git push
