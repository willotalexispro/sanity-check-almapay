name: Screaming Frog weekly crawl

on:
  schedule:
    - cron: '0 7 * * 1'  # tous les lundis à 7h UTC (9h Paris)
  workflow_dispatch:      # permet aussi de lancer à la main depuis GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set crawl date
        run: echo "CRAWL_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Install Screaming Frog CLI
        run: |
          DEB_URL=$(curl -sI "https://download.screamingfrog.co.uk/products/seo-spider/screamingfrogseospider_latest_all.deb" \
            | grep -i '^location:' | awk '{print $2}' | tr -d '\r\n')
          DEB_FILE=$(basename "$DEB_URL")
          echo "Téléchargement : $DEB_FILE"
          wget -q "$DEB_URL" -O "$DEB_FILE"
          sudo apt-get install -y "./$DEB_FILE"

      - name: Activate Screaming Frog licence and accept EULA
        run: |
          mkdir -p ~/.ScreamingFrogSEOSpider
          printf '%s\n%s\n' "${{ secrets.SF_LICENSE_USERNAME }}" "${{ secrets.SF_LICENSE_KEY }}" \
            > ~/.ScreamingFrogSEOSpider/licence.txt
          echo "eula.accepted=15" > ~/.ScreamingFrogSEOSpider/spider.config

      - name: Run crawl
        run: |
          mkdir -p results/${{ env.CRAWL_DATE }}
          screamingfrogseospider \
            --headless \
            --crawl http://spilou.com/ \
            --export-tabs "Internal:All" \
            --save-report "Crawl Overview" \
            --overwrite \
            --output-folder results/${{ env.CRAWL_DATE }}
          echo "Fichiers produits :"
          ls results/${{ env.CRAWL_DATE }}/

      - name: Process Internal:All
        run: |
          cat > /tmp/process_internal.py << 'PYEOF'
          import csv, re, sys
          crawl_date, csv_file, out_file = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(csv_file, newline='', encoding='utf-8-sig') as fin, \
               open(out_file, 'w', newline='', encoding='utf-8') as fout:
              reader = csv.reader(fin)
              writer = csv.writer(fout)
              headers = next(reader)
              clean = ['crawl_date'] + [
                  re.sub(r'_+', '_', re.sub(r'[^a-zA-Z0-9]', '_', h)).strip('_')
                  for h in headers
              ]
              writer.writerow(clean)
              for row in reader:
                  writer.writerow([crawl_date] + row)
          PYEOF
          python3 /tmp/process_internal.py \
            "${{ env.CRAWL_DATE }}" \
            "results/${{ env.CRAWL_DATE }}/internal_all.csv" \
            "results/${{ env.CRAWL_DATE }}/internal_all.dated.csv"

      - name: Process Crawl Overview → wide format (1 ligne par crawl)
        run: |
          cat > /tmp/process_summary_wide.py << 'PYEOF'
          import csv, re, sys

          crawl_date, csv_file, out_file = sys.argv[1], sys.argv[2], sys.argv[3]

          # Lignes à ignorer : métadonnées en tête, en-têtes de tableau, sections vides
          SKIP_KEYS = {
              'Summary', 'Internal', 'External', 'Response Codes', 'Redirects',
              'Canonicals', 'Pagination', 'Images', 'CSS', 'JavaScript',
              'Security', 'Hreflang', 'AMP', 'Structured Data', 'Custom',
              'Site Crawled', 'Start Date', 'Start Time', 'Last Modified Date',
              'Last Modified Time', 'Elapsed', 'Report Date', 'Report Time',
          }
          SKIP_VALUES = {'URLs', '% of Total', 'Total URLs', 'Total URLs Description', ''}

          metrics = {}
          with open(csv_file, newline='', encoding='utf-8-sig') as fin:
              reader = csv.reader(fin)
              for row in reader:
                  if not row or not row[0].strip():
                      continue
                  key = row[0].strip()
                  if key in SKIP_KEYS:
                      continue
                  value = row[1].strip() if len(row) > 1 else ''
                  if value in SKIP_VALUES:
                      continue
                  clean_key = re.sub(r'_+', '_', re.sub(r'[^a-zA-Z0-9]', '_', key)).strip('_').lower()
                  metrics[clean_key] = value

          with open(out_file, 'w', newline='', encoding='utf-8') as fout:
              writer = csv.writer(fout)
              writer.writerow(['crawl_date'] + list(metrics.keys()))
              writer.writerow([crawl_date] + list(metrics.values()))

          print(f"Crawl Overview : {len(metrics)} métriques extraites")
          PYEOF
          python3 /tmp/process_summary_wide.py \
            "${{ env.CRAWL_DATE }}" \
            "results/${{ env.CRAWL_DATE }}/crawl_overview.csv" \
            "results/${{ env.CRAWL_DATE }}/crawl_summary_wide.csv"

      - name: Install Python dependencies
        run: pip install gspread

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload to Google Sheets
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          cat > /tmp/upload_sheets.py << 'PYEOF'
          import gspread, csv, os

          gc = gspread.service_account(filename=os.environ['GOOGLE_APPLICATION_CREDENTIALS'])
          spreadsheet = gc.open_by_key(os.environ['GOOGLE_SHEET_ID'])
          crawl_date = os.environ['CRAWL_DATE']

          def read_csv(path):
              with open(path, newline='', encoding='utf-8') as f:
                  return list(csv.reader(f))

          def get_or_create_sheet(spreadsheet, name, rows=5000, cols=100):
              try:
                  return spreadsheet.worksheet(name)
              except gspread.WorksheetNotFound:
                  return spreadsheet.add_worksheet(title=name, rows=rows, cols=cols)

          # --- Internal All : SUPPRIME et REMPLACE ---
          internal_path = f"results/{crawl_date}/internal_all.dated.csv"
          if os.path.exists(internal_path):
              data = read_csv(internal_path)
              ws = get_or_create_sheet(spreadsheet, 'Internal All')
              ws.clear()
              ws.update(data)
              print(f"[Internal All] {len(data)-1} URLs uploadées (remplacement complet)")
          else:
              print("[Internal All] fichier introuvable, skip")

          # --- Crawl Summary : ACCUMULE une ligne par crawl ---
          summary_path = f"results/{crawl_date}/crawl_summary_wide.csv"
          if os.path.exists(summary_path):
              new_data = read_csv(summary_path)
              if len(new_data) < 2:
                  print("[Crawl Summary] fichier vide, skip")
              else:
                  header   = new_data[0]
                  new_rows = new_data[1:]
                  ws = get_or_create_sheet(spreadsheet, 'Crawl Summary', rows=1000, cols=200)
                  existing = ws.get_all_values()
                  if existing:
                      # Retire les lignes du même jour (idempotent si relance)
                      filtered = [r for r in existing[1:] if r and r[0] != crawl_date]
                      ws.clear()
                      ws.update([header] + filtered + new_rows)
                  else:
                      ws.update([header] + new_rows)
                  print(f"[Crawl Summary] ligne {crawl_date} ajoutée")
          else:
              print("[Crawl Summary] fichier introuvable, skip")
          PYEOF
          python3 /tmp/upload_sheets.py

      - name: Commit results to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/
          git commit -m "crawl SF ${{ env.CRAWL_DATE }}" || echo "rien de nouveau"
          git push
