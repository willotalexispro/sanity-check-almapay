name: Screaming Frog weekly crawl

on:
  schedule:
    - cron: '0 23 * * 0'  # tous les dimanches à 23h UTC (minuit/1h Paris)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SF_GOOGLE_ACCOUNT: willot.alexis.pro@gmail.com

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set crawl date
        run: echo "CRAWL_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Install Screaming Frog CLI
        run: |
          DEB_URL=$(curl -sI "https://download.screamingfrog.co.uk/products/seo-spider/screamingfrogseospider_latest_all.deb" \
            | grep -i '^location:' | awk '{print $2}' | tr -d '\r\n')
          DEB_FILE=$(basename "$DEB_URL")
          wget -q "$DEB_URL" -O "$DEB_FILE"
          sudo apt-get install -y "./$DEB_FILE"

      - name: Activate Screaming Frog licence and accept EULA
        run: |
          mkdir -p ~/.ScreamingFrogSEOSpider
          printf '%s\n%s\n' "${{ secrets.SF_LICENSE_USERNAME }}" "${{ secrets.SF_LICENSE_KEY }}" \
            > ~/.ScreamingFrogSEOSpider/licence.txt
          echo "${{ secrets.SF_LEASE_JSON }}" | base64 -d > ~/.ScreamingFrogSEOSpider/lease.json
          echo "8f6307e2-82bb-449b-953c-4487a780aaaf" > ~/.ScreamingFrogSEOSpider/machine-id.txt
          echo "eula.accepted=15" > ~/.ScreamingFrogSEOSpider/spider.config

      - name: Restore Google Drive credentials
        run: |
          CRED_DIR="$HOME/.ScreamingFrogSEOSpider/google_drive/saveduser/${{ env.SF_GOOGLE_ACCOUNT }}"
          mkdir -p "$CRED_DIR"
          echo "${{ secrets.SF_GOOGLE_DRIVE_STORED_CREDENTIAL }}" | base64 -d > "$CRED_DIR/StoredCredential"
          echo "${{ secrets.SF_GOOGLE_DRIVE_ACCOUNT_CONFIG }}"   | base64 -d > "$CRED_DIR/AccountConfig"
          echo "${{ env.SF_GOOGLE_ACCOUNT }}" > "$HOME/.ScreamingFrogSEOSpider/google_drive/preferredAccount"
          echo "Credentials restaurées pour ${{ env.SF_GOOGLE_ACCOUNT }}"

      - name: Run crawl
        run: |
          COLUMNS=$(cat config/custom_summary_columns.txt)
          mkdir -p results/${{ env.CRAWL_DATE }}
          screamingfrogseospider \
            --headless \
            --crawl https://almapay.com/ \
            --config config/almapay.seospider \
            --export-tabs "Internal:All" \
            --export-custom-summary "$COLUMNS" \
            --google-drive-account "${{ env.SF_GOOGLE_ACCOUNT }}" \
            --overwrite \
            --output-folder results/${{ env.CRAWL_DATE }}
          echo "Fichiers produits :"
          ls results/${{ env.CRAWL_DATE }}/

      - name: Process Internal:All
        run: |
          cat > /tmp/process_internal.py << 'PYEOF'
          import csv, re, sys
          crawl_date, csv_file, out_file = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(csv_file, newline='', encoding='utf-8-sig') as fin, \
               open(out_file, 'w', newline='', encoding='utf-8') as fout:
              reader = csv.reader(fin)
              writer = csv.writer(fout)
              headers = next(reader)
              clean = ['crawl_date'] + [
                  re.sub(r'_+', '_', re.sub(r'[^a-zA-Z0-9]', '_', h)).strip('_')
                  for h in headers
              ]
              writer.writerow(clean)
              for row in reader:
                  writer.writerow([crawl_date] + row)
          PYEOF
          python3 /tmp/process_internal.py \
            "${{ env.CRAWL_DATE }}" \
            "results/${{ env.CRAWL_DATE }}/internal_all.csv" \
            "results/${{ env.CRAWL_DATE }}/internal_all.dated.csv"

      - name: Install Python dependencies
        run: pip install gspread

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload Internal:All to Google Sheets
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          cat > /tmp/upload_internal.py << 'PYEOF'
          import gspread, csv, os

          gc = gspread.service_account(filename=os.environ['GOOGLE_APPLICATION_CREDENTIALS'])
          spreadsheet = gc.open_by_key(os.environ['GOOGLE_SHEET_ID'])
          crawl_date = os.environ['CRAWL_DATE']

          def read_csv(path):
              with open(path, newline='', encoding='utf-8') as f:
                  return list(csv.reader(f))

          def get_or_create_sheet(spreadsheet, name, rows=5000, cols=100):
              try:
                  return spreadsheet.worksheet(name)
              except gspread.WorksheetNotFound:
                  return spreadsheet.add_worksheet(title=name, rows=rows, cols=cols)

          internal_path = f"results/{crawl_date}/internal_all.dated.csv"
          if os.path.exists(internal_path):
              data = read_csv(internal_path)
              ws = get_or_create_sheet(spreadsheet, 'Internal All')
              ws.clear()
              ws.update(data)
              print(f"[Internal All] {len(data)-1} URLs uploadées (remplacement complet)")
          else:
              print("[Internal All] fichier introuvable, skip")
          PYEOF
          python3 /tmp/upload_internal.py

      - name: Commit results to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/
          git commit -m "crawl SF ${{ env.CRAWL_DATE }}" || echo "rien de nouveau"
          git push
