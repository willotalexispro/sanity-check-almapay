name: Screaming Frog weekly crawl

on:
  schedule:
    - cron: '0 23 * * 0'  # tous les dimanches à 23h UTC (minuit/1h Paris)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SF_GOOGLE_ACCOUNT: willot.alexis.pro@gmail.com

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Crawl Screaming Frog + commit résultats
  # ─────────────────────────────────────────────
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      crawl_date: ${{ steps.set_date.outputs.crawl_date }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set crawl date
        id: set_date
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "CRAWL_DATE=$DATE" >> $GITHUB_ENV
          echo "crawl_date=$DATE" >> $GITHUB_OUTPUT

      - name: Install Screaming Frog CLI
        run: |
          DEB_URL=$(curl -sI "https://download.screamingfrog.co.uk/products/seo-spider/screamingfrogseospider_latest_all.deb" \
            | grep -i '^location:' | awk '{print $2}' | tr -d '\r\n')
          DEB_FILE=$(basename "$DEB_URL")
          wget -q "$DEB_URL" -O "$DEB_FILE"
          sudo apt-get install -y "./$DEB_FILE"

      - name: Activate Screaming Frog licence and accept EULA
        run: |
          mkdir -p ~/.ScreamingFrogSEOSpider
          printf '%s\n%s\n' "${{ secrets.SF_LICENSE_USERNAME }}" "${{ secrets.SF_LICENSE_KEY }}" \
            > ~/.ScreamingFrogSEOSpider/licence.txt
          echo "${{ secrets.SF_LEASE_JSON }}" | base64 -d > ~/.ScreamingFrogSEOSpider/lease.json
          echo "8f6307e2-82bb-449b-953c-4487a780aaaf" > ~/.ScreamingFrogSEOSpider/machine-id.txt
          printf 'eula.accepted=15\nPSI.secretkey=%s\nPSI.auto_connect=true\ngsc.auto_connect_account=Nouveau compte 4\n' \
            "${{ secrets.SF_PSI_API_KEY }}" \
            > ~/.ScreamingFrogSEOSpider/spider.config

      - name: Restore Google Search Console credentials
        run: |
          CRED_DIR="$HOME/.ScreamingFrogSEOSpider/search_console/saveduser/Nouveau compte 4"
          mkdir -p "$CRED_DIR"
          echo "${{ secrets.SF_GSC_STORED_CREDENTIAL }}" | base64 -d > "$CRED_DIR/StoredCredential"
          echo "${{ secrets.SF_GSC_ACCOUNT_CONFIG }}"    | base64 -d > "$CRED_DIR/AccountConfig"

      - name: Restore Google Drive credentials
        run: |
          CRED_DIR="$HOME/.ScreamingFrogSEOSpider/google_drive/saveduser/${{ env.SF_GOOGLE_ACCOUNT }}"
          mkdir -p "$CRED_DIR"
          echo "${{ secrets.SF_GOOGLE_DRIVE_STORED_CREDENTIAL }}" | base64 -d > "$CRED_DIR/StoredCredential"
          echo "${{ secrets.SF_GOOGLE_DRIVE_ACCOUNT_CONFIG }}"   | base64 -d > "$CRED_DIR/AccountConfig"
          echo "${{ env.SF_GOOGLE_ACCOUNT }}" > "$HOME/.ScreamingFrogSEOSpider/google_drive/preferredAccount"

      - name: Run crawl
        run: |
          COLUMNS=$(cat config/custom_summary_columns.txt)
          mkdir -p results/${{ env.CRAWL_DATE }}
          screamingfrogseospider \
            --headless \
            --crawl https://almapay.com/ \
            --config config/almapay.seospiderconfig \
            --export-tabs "Internal:All" \
            --export-custom-summary "$COLUMNS" \
            --save-report "Crawl Overview,Issues Overview" \
            --google-drive-account "${{ env.SF_GOOGLE_ACCOUNT }}" \
            --overwrite \
            --output-folder results/${{ env.CRAWL_DATE }}
          echo "Fichiers produits :"
          ls results/${{ env.CRAWL_DATE }}/

      - name: Process Internal:All
        run: |
          python3 - "${{ env.CRAWL_DATE }}" \
            "results/${{ env.CRAWL_DATE }}/internal_all.csv" \
            "results/${{ env.CRAWL_DATE }}/internal_all.dated.csv" << 'PYEOF'
          import csv, re, sys
          crawl_date, csv_file, out_file = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(csv_file, newline='', encoding='utf-8-sig') as fin, \
               open(out_file, 'w', newline='', encoding='utf-8') as fout:
              reader = csv.reader(fin)
              writer = csv.writer(fout)
              headers = next(reader)
              clean = ['crawl_date'] + [
                  re.sub(r'_+', '_', re.sub(r'[^a-zA-Z0-9]', '_', h)).strip('_')
                  for h in headers
              ]
              writer.writerow(clean)
              for row in reader:
                  writer.writerow([crawl_date] + row)
          PYEOF

      - name: Cleanup old results (keep last 8 weeks)
        run: |
          if [ -d results ]; then
            ls results/ | grep "^20" | sort | head -n -8 | while read dir; do
              echo "Suppression de results/$dir"
              rm -rf "results/$dir"
            done
          fi

      - name: Commit results to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/
          git commit -m "crawl SF ${{ env.CRAWL_DATE }}" || echo "rien de nouveau"
          git push

  # ─────────────────────────────────────────────
  # JOB 2 — Upload Google Sheets (parallèle avec deck)
  # ─────────────────────────────────────────────
  sheets:
    needs: crawl
    runs-on: ubuntu-latest
    env:
      CRAWL_DATE: ${{ needs.crawl.outputs.crawl_date }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Python dependencies
        run: pip install gspread

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload to Google Sheets
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python3 << 'PYEOF'
          import gspread, csv, os

          gc = gspread.service_account(filename=os.environ['GOOGLE_APPLICATION_CREDENTIALS'])
          spreadsheet = gc.open_by_key(os.environ['GOOGLE_SHEET_ID'])
          crawl_date = os.environ['CRAWL_DATE']

          def read_csv(path):
              with open(path, newline='', encoding='utf-8') as f:
                  return list(csv.reader(f))

          def get_or_create_sheet(spreadsheet, name, rows=5000, cols=100):
              try:
                  return spreadsheet.worksheet(name)
              except gspread.WorksheetNotFound:
                  return spreadsheet.add_worksheet(title=name, rows=rows, cols=cols)

          for path, tab, r, c in [
              (f"results/{crawl_date}/internal_all.dated.csv",   'Internal All',   5000, 100),
              (f"results/{crawl_date}/crawl_overview.csv",        'Crawl Overview',  500,  50),
              (f"results/{crawl_date}/issues_overview_report.csv",'Issues Overview', 500,  10),
          ]:
              if os.path.exists(path):
                  data = read_csv(path)
                  ws = get_or_create_sheet(spreadsheet, tab, rows=r, cols=c)
                  ws.clear()
                  ws.update(data)
                  print(f"[{tab}] {len(data)-1} lignes uploadées")
              else:
                  print(f"[{tab}] fichier introuvable, skip")
          PYEOF

  # ─────────────────────────────────────────────
  # JOB 3 — Génération PPTX + upload Google Drive
  # ─────────────────────────────────────────────
  deck:
    needs: crawl
    runs-on: ubuntu-latest
    env:
      CRAWL_DATE: ${{ needs.crawl.outputs.crawl_date }}
    outputs:
      drive_link: ${{ steps.drive_upload.outputs.drive_link }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PPTX
        run: |
          OVERVIEW="results/${{ env.CRAWL_DATE }}/crawl_overview.csv"
          if [ ! -f "$OVERVIEW" ]; then
            echo "crawl_overview.csv introuvable, skip"
            exit 0
          fi
          npm ci --prefix pipeline --silent
          PREV_DATE=$(ls results/ | grep "^20" | grep -v "${{ env.CRAWL_DATE }}" | sort | tail -1)
          PPTX_OUT="results/${{ env.CRAWL_DATE }}/deck_${{ env.CRAWL_DATE }}.pptx"
          if [ -n "$PREV_DATE" ] && [ -f "results/$PREV_DATE/crawl_overview.csv" ]; then
            echo "Génération avec comparaison vs $PREV_DATE"
            node pipeline/generate.js \
              --current "$OVERVIEW" \
              --previous "results/$PREV_DATE/crawl_overview.csv" \
              --config pipeline/configs/almapay.json \
              --output "$PPTX_OUT"
          else
            echo "Génération baseline (sans comparaison W-o-W)"
            node pipeline/generate.js \
              --current "$OVERVIEW" \
              --config pipeline/configs/almapay.json \
              --output "$PPTX_OUT"
          fi
          echo "PPTX_PATH=$PPTX_OUT" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload PPTX to Google Drive
        id: drive_upload
        run: |
          if [ -z "$PPTX_PATH" ] || [ ! -f "$PPTX_PATH" ]; then
            echo "PPTX introuvable, skip upload"
            exit 0
          fi
          pip install google-api-python-client -q
          python3 << 'PYEOF'
          import os
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.auth import default

          pptx_path = os.environ['PPTX_PATH']
          crawl_date = os.environ['CRAWL_DATE']

          creds, _ = default(scopes=['https://www.googleapis.com/auth/drive.file'])
          service = build('drive', 'v3', credentials=creds)

          file_name = f"Crawl Overview AlmaPay - {crawl_date}.pptx"
          media = MediaFileUpload(
              pptx_path,
              mimetype='application/vnd.openxmlformats-officedocument.presentationml.presentation'
          )
          file = service.files().create(
              body={'name': file_name},
              media_body=media,
              fields='id'
          ).execute()
          file_id = file.get('id')

          service.permissions().create(
              fileId=file_id,
              body={'type': 'anyone', 'role': 'reader'}
          ).execute()

          link = f"https://drive.google.com/file/d/{file_id}/view"
          print(f"PPTX uploadé : {link}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"drive_link={link}\n")
          PYEOF

  # ─────────────────────────────────────────────
  # JOB 4 — Audit SEO + notification Slack
  # ─────────────────────────────────────────────
  slack:
    needs: [crawl, sheets, deck]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Audit SEO + notification Slack
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITE_URL: https://almapay.com/
          CRAWL_DATE: ${{ needs.crawl.outputs.crawl_date }}
          PPTX_DRIVE_LINK: ${{ needs.deck.outputs.drive_link }}
        run: |
          pip install anthropic requests -q
          python3 << 'PYEOF'
          import csv, os, glob, requests, anthropic

          crawl_date = os.environ['CRAWL_DATE']
          site_url   = os.environ['SITE_URL']
          drive_link = os.environ.get('PPTX_DRIVE_LINK', '')

          def extract_metrics(csv_path):
              metrics = {
                  'total': 0, '2xx': 0, '3xx': 0, '4xx': 0, '5xx': 0,
                  'no_title': 0, 'no_meta': 0, 'no_h1': 0,
                  'non_indexable': 0, 'duplicate_title': 0,
              }
              if not os.path.exists(csv_path):
                  return None
              with open(csv_path, newline='', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  titles = []
                  for row in reader:
                      metrics['total'] += 1
                      status = str(row.get('Status_Code', '')).strip()
                      if status.startswith('2'): metrics['2xx'] += 1
                      elif status.startswith('3'): metrics['3xx'] += 1
                      elif status.startswith('4'): metrics['4xx'] += 1
                      elif status.startswith('5'): metrics['5xx'] += 1
                      title = row.get('Title_1', '').strip()
                      if not title: metrics['no_title'] += 1
                      else: titles.append(title)
                      if not row.get('Meta_Description_1', '').strip():
                          metrics['no_meta'] += 1
                      if not row.get('H1_1', '').strip():
                          metrics['no_h1'] += 1
                      indexability = row.get('Indexability', '').strip()
                      if indexability and indexability.lower() != 'indexable':
                          metrics['non_indexable'] += 1
                  from collections import Counter
                  metrics['duplicate_title'] = sum(c - 1 for c in Counter(titles).values() if c > 1)
              return metrics

          current = extract_metrics(f"results/{crawl_date}/internal_all.dated.csv")
          if not current:
              print("CSV introuvable, skip")
              exit(0)

          all_dates = sorted([
              os.path.basename(d)
              for d in glob.glob('results/20*')
              if os.path.basename(d) != crawl_date
          ], reverse=True)
          previous, prev_date = None, None
          if all_dates:
              prev_date = all_dates[0]
              previous = extract_metrics(f"results/{prev_date}/internal_all.dated.csv")

          def delta(cur, prev, key, lower_is_better=True):
              if prev is None: return ''
              d = cur[key] - prev[key]
              if d == 0: return '→ 0'
              arrow = '↑' if d > 0 else '↓'
              good = (d < 0) if lower_is_better else (d > 0)
              emoji = '✅' if good else '🔴'
              return f"{arrow} {'+' if d > 0 else ''}{d} {emoji}"

          summary = f"""Site: {site_url}
          Crawl actuel ({crawl_date}):
          - Total URLs: {current['total']}
          - 2xx: {current['2xx']}, 3xx: {current['3xx']}, 4xx: {current['4xx']}, 5xx: {current['5xx']}
          - Sans titre: {current['no_title']}, Sans meta description: {current['no_meta']}, Sans H1: {current['no_h1']}
          - Non-indexables: {current['non_indexable']}, Titres dupliqués: {current['duplicate_title']}
          """
          if previous:
              summary += f"""
          Crawl précédent ({prev_date}):
          - Total URLs: {previous['total']}
          - 2xx: {previous['2xx']}, 3xx: {previous['3xx']}, 4xx: {previous['4xx']}, 5xx: {previous['5xx']}
          - Sans titre: {previous['no_title']}, Sans meta description: {previous['no_meta']}, Sans H1: {previous['no_h1']}
          - Non-indexables: {previous['non_indexable']}, Titres dupliqués: {previous['duplicate_title']}
          """

          client = anthropic.Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])
          message = client.messages.create(
              model="claude-haiku-4-5-20251001",
              max_tokens=400,
              messages=[{"role": "user", "content": f"""Tu es un expert SEO. Analyse ces métriques de crawl et génère un audit concis en 4-5 points maximum.
          Sois direct, pratique, en français. Mets en avant les points critiques et les évolutions notables vs le crawl précédent si disponible.
          Format : bullet points courts (1 ligne chacun), pas de titre, pas d'introduction, pas de markdown (pas de **, pas de *, pas de #).

          {summary}"""}]
          )
          audit = message.content[0].text.strip()
          import re as _re
          audit = _re.sub(r'\*\*(.+?)\*\*', r'\1', audit)
          audit = _re.sub(r'\*(.+?)\*', r'\1', audit)

          comp = f" vs {prev_date}" if prev_date else ""
          lines = [
              f"*🕷️ Crawl {site_url} — {crawl_date}{comp}*\n",
              f"{'─'*40}",
              f"📊 *URLs crawlées :* {current['total']}  {delta(current, previous, 'total', lower_is_better=False)}",
              f"✅ *2xx :* {current['2xx']}  {delta(current, previous, '2xx', lower_is_better=False)}",
              f"↪️  *3xx redirects :* {current['3xx']}  {delta(current, previous, '3xx')}",
              f"❌ *4xx erreurs :* {current['4xx']}  {delta(current, previous, '4xx')}",
              f"💥 *5xx erreurs :* {current['5xx']}  {delta(current, previous, '5xx')}",
              f"🔴 *Sans titre :* {current['no_title']}  {delta(current, previous, 'no_title')}",
              f"🟡 *Sans meta desc :* {current['no_meta']}  {delta(current, previous, 'no_meta')}",
              f"🚫 *Non-indexables :* {current['non_indexable']}  {delta(current, previous, 'non_indexable')}",
              f"{'─'*40}",
              f"*🤖 Analyse Claude :*",
              audit,
          ]
          if drive_link:
              lines.append(f"{'─'*40}")
              lines.append(f"📎 *Deck PPTX :* <{drive_link}|Crawl Overview AlmaPay — {crawl_date}.pptx>")
          text = '\n'.join(lines)

          resp = requests.post(
              os.environ['SLACK_WEBHOOK_URL'],
              json={"text": text},
              headers={"Content-Type": "application/json"}
          )
          print(f"Slack: {resp.status_code} — {resp.text}")
          PYEOF
