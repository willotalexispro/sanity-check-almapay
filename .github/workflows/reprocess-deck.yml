name: Reprocess deck + Slack (date existante)

on:
  workflow_dispatch:
    inputs:
      crawl_date:
        description: 'Date du crawl à reprocesser (YYYY-MM-DD)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Génération PPTX + upload Google Drive
  # ─────────────────────────────────────────────
  deck:
    runs-on: ubuntu-latest
    env:
      CRAWL_DATE: ${{ inputs.crawl_date }}
    outputs:
      drive_link: ${{ steps.drive_upload.outputs.drive_link }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PPTX
        run: |
          OVERVIEW="results/${{ env.CRAWL_DATE }}/crawl_overview.csv"
          if [ ! -f "$OVERVIEW" ]; then
            echo "crawl_overview.csv introuvable pour ${{ env.CRAWL_DATE }}, abandon"
            exit 1
          fi
          npm ci --prefix pipeline --silent
          PREV_DATE=$(ls results/ | grep "^20" | grep -v "${{ env.CRAWL_DATE }}" | sort | tail -1)
          PPTX_OUT="results/${{ env.CRAWL_DATE }}/deck_${{ env.CRAWL_DATE }}.pptx"
          if [ -n "$PREV_DATE" ] && [ -f "results/$PREV_DATE/crawl_overview.csv" ]; then
            echo "Génération avec comparaison vs $PREV_DATE"
            node pipeline/generate.js \
              --current "$OVERVIEW" \
              --previous "results/$PREV_DATE/crawl_overview.csv" \
              --config pipeline/configs/almapay.json \
              --output "$PPTX_OUT"
          else
            echo "Génération baseline (sans comparaison W-o-W)"
            node pipeline/generate.js \
              --current "$OVERVIEW" \
              --config pipeline/configs/almapay.json \
              --output "$PPTX_OUT"
          fi
          echo "PPTX_PATH=$PPTX_OUT" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload PPTX to Google Drive
        id: drive_upload
        run: |
          if [ -z "$PPTX_PATH" ] || [ ! -f "$PPTX_PATH" ]; then
            echo "PPTX introuvable, skip upload"
            exit 0
          fi
          pip install google-api-python-client -q
          python3 << 'PYEOF'
          import os
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.auth import default

          pptx_path = os.environ['PPTX_PATH']
          crawl_date = os.environ['CRAWL_DATE']

          creds, _ = default(scopes=['https://www.googleapis.com/auth/drive.file'])
          service = build('drive', 'v3', credentials=creds)

          file_name = f"Crawl Overview AlmaPay - {crawl_date}.pptx"
          media = MediaFileUpload(
              pptx_path,
              mimetype='application/vnd.openxmlformats-officedocument.presentationml.presentation'
          )
          file = service.files().create(
              body={'name': file_name},
              media_body=media,
              fields='id'
          ).execute()
          file_id = file.get('id')

          service.permissions().create(
              fileId=file_id,
              body={'type': 'anyone', 'role': 'reader'}
          ).execute()

          link = f"https://drive.google.com/file/d/{file_id}/view"
          print(f"PPTX uploadé : {link}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"drive_link={link}\n")
          PYEOF

  # ─────────────────────────────────────────────
  # JOB 2 — Audit SEO + notification Slack
  # ─────────────────────────────────────────────
  slack:
    needs: deck
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Audit SEO + notification Slack
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITE_URL: https://almapay.com/
          CRAWL_DATE: ${{ inputs.crawl_date }}
          PPTX_DRIVE_LINK: ${{ needs.deck.outputs.drive_link }}
        run: |
          pip install anthropic requests -q
          python3 << 'PYEOF'
          import csv, os, glob, requests, anthropic

          crawl_date = os.environ['CRAWL_DATE']
          site_url   = os.environ['SITE_URL']
          drive_link = os.environ.get('PPTX_DRIVE_LINK', '')

          def extract_metrics(csv_path):
              metrics = {
                  'total': 0, '2xx': 0, '3xx': 0, '4xx': 0, '5xx': 0,
                  'no_title': 0, 'no_meta': 0, 'no_h1': 0,
                  'non_indexable': 0, 'duplicate_title': 0,
              }
              if not os.path.exists(csv_path):
                  return None
              with open(csv_path, newline='', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  titles = []
                  for row in reader:
                      metrics['total'] += 1
                      status = str(row.get('Status_Code', '')).strip()
                      if status.startswith('2'): metrics['2xx'] += 1
                      elif status.startswith('3'): metrics['3xx'] += 1
                      elif status.startswith('4'): metrics['4xx'] += 1
                      elif status.startswith('5'): metrics['5xx'] += 1
                      title = row.get('Title_1', '').strip()
                      if not title: metrics['no_title'] += 1
                      else: titles.append(title)
                      if not row.get('Meta_Description_1', '').strip():
                          metrics['no_meta'] += 1
                      if not row.get('H1_1', '').strip():
                          metrics['no_h1'] += 1
                      indexability = row.get('Indexability', '').strip()
                      if indexability and indexability.lower() != 'indexable':
                          metrics['non_indexable'] += 1
                  from collections import Counter
                  metrics['duplicate_title'] = sum(c - 1 for c in Counter(titles).values() if c > 1)
              return metrics

          current = extract_metrics(f"results/{crawl_date}/internal_all.dated.csv")
          if not current:
              print("CSV introuvable, skip")
              exit(0)

          all_dates = sorted([
              os.path.basename(d)
              for d in glob.glob('results/20*')
              if os.path.basename(d) != crawl_date
          ], reverse=True)
          previous, prev_date = None, None
          if all_dates:
              prev_date = all_dates[0]
              previous = extract_metrics(f"results/{prev_date}/internal_all.dated.csv")

          def delta(cur, prev, key, lower_is_better=True):
              if prev is None: return ''
              d = cur[key] - prev[key]
              if d == 0: return '→ 0'
              arrow = '↑' if d > 0 else '↓'
              good = (d < 0) if lower_is_better else (d > 0)
              emoji = '✅' if good else '🔴'
              return f"{arrow} {'+' if d > 0 else ''}{d} {emoji}"

          summary = f"""Site: {site_url}
          Crawl actuel ({crawl_date}):
          - Total URLs: {current['total']}
          - 2xx: {current['2xx']}, 3xx: {current['3xx']}, 4xx: {current['4xx']}, 5xx: {current['5xx']}
          - Sans titre: {current['no_title']}, Sans meta description: {current['no_meta']}, Sans H1: {current['no_h1']}
          - Non-indexables: {current['non_indexable']}, Titres dupliqués: {current['duplicate_title']}
          """
          if previous:
              summary += f"""
          Crawl précédent ({prev_date}):
          - Total URLs: {previous['total']}
          - 2xx: {previous['2xx']}, 3xx: {previous['3xx']}, 4xx: {previous['4xx']}, 5xx: {previous['5xx']}
          - Sans titre: {previous['no_title']}, Sans meta description: {previous['no_meta']}, Sans H1: {previous['no_h1']}
          - Non-indexables: {previous['non_indexable']}, Titres dupliqués: {previous['duplicate_title']}
          """

          client = anthropic.Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])
          message = client.messages.create(
              model="claude-haiku-4-5-20251001",
              max_tokens=400,
              messages=[{"role": "user", "content": f"""Tu es un expert SEO. Analyse ces métriques de crawl et génère un audit concis en 4-5 points maximum.
          Sois direct, pratique, en français. Mets en avant les points critiques et les évolutions notables vs le crawl précédent si disponible.
          Format : bullet points courts (1 ligne chacun), pas de titre, pas d'introduction, pas de markdown (pas de **, pas de *, pas de #).

          {summary}"""}]
          )
          audit = message.content[0].text.strip()
          import re as _re
          audit = _re.sub(r'\*\*(.+?)\*\*', r'\1', audit)
          audit = _re.sub(r'\*(.+?)\*', r'\1', audit)

          comp = f" vs {prev_date}" if prev_date else ""
          lines = [
              f"*🕷️ Crawl {site_url} — {crawl_date}{comp}*\n",
              f"{'─'*40}",
              f"📊 *URLs crawlées :* {current['total']}  {delta(current, previous, 'total', lower_is_better=False)}",
              f"✅ *2xx :* {current['2xx']}  {delta(current, previous, '2xx', lower_is_better=False)}",
              f"↪️  *3xx redirects :* {current['3xx']}  {delta(current, previous, '3xx')}",
              f"❌ *4xx erreurs :* {current['4xx']}  {delta(current, previous, '4xx')}",
              f"💥 *5xx erreurs :* {current['5xx']}  {delta(current, previous, '5xx')}",
              f"🔴 *Sans titre :* {current['no_title']}  {delta(current, previous, 'no_title')}",
              f"🟡 *Sans meta desc :* {current['no_meta']}  {delta(current, previous, 'no_meta')}",
              f"🚫 *Non-indexables :* {current['non_indexable']}  {delta(current, previous, 'non_indexable')}",
              f"{'─'*40}",
              f"*🤖 Analyse Claude :*",
              audit,
          ]
          if drive_link:
              lines.append(f"{'─'*40}")
              lines.append(f"📎 *Deck PPTX :* <{drive_link}|Crawl Overview AlmaPay — {crawl_date}.pptx>")
          text = '\n'.join(lines)

          resp = requests.post(
              os.environ['SLACK_WEBHOOK_URL'],
              json={"text": text},
              headers={"Content-Type": "application/json"}
          )
          print(f"Slack: {resp.status_code} — {resp.text}")
          PYEOF
