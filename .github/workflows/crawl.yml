name: SEO Sanity Check - almapay.com

on:
  schedule:
    - cron: '0 1 * * 0'  # dimanche/samedi nuit Paris
  workflow_dispatch:
    inputs:
      generate_deck:
        description: 'GÃĐnÃĐrer le deck PPTX et envoyer Ã  n8n'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ââ Job 1 : crawl + commit des rÃĐsultats âââââââââââââââââââââââââââââââââââââ
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      crawl_date: ${{ steps.date.outputs.crawl_date }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set crawl date
        id: date
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "CRAWL_DATE=$DATE" >> $GITHUB_ENV
          echo "crawl_date=$DATE" >> $GITHUB_OUTPUT

      - name: Resolve SF installer URL
        id: sf
        run: |
          DEB_URL=$(curl -sI "https://download.screamingfrog.co.uk/products/seo-spider/screamingfrogseospider_latest_all.deb" \
            | grep -i '^location:' | awk '{print $2}' | tr -d '\r\n')
          DEB_FILE=$(basename "$DEB_URL")
          echo "deb_url=$DEB_URL"   >> $GITHUB_OUTPUT
          echo "deb_file=$DEB_FILE" >> $GITHUB_OUTPUT

      - name: Cache SF installer
        id: cache_sf
        uses: actions/cache@v4
        with:
          path: ${{ steps.sf.outputs.deb_file }}
          key: sf-${{ steps.sf.outputs.deb_file }}

      - name: Download SF installer
        if: steps.cache_sf.outputs.cache-hit != 'true'
        run: wget -q "${{ steps.sf.outputs.deb_url }}" -O "${{ steps.sf.outputs.deb_file }}"

      - name: Install Screaming Frog
        run: sudo apt-get install -y "./${{ steps.sf.outputs.deb_file }}"

      - name: Activate Screaming Frog licence
        run: |
          mkdir -p ~/.ScreamingFrogSEOSpider
          printf '%s\n%s\n' "${{ secrets.SF_LICENSE_USERNAME }}" "${{ secrets.SF_LICENSE_KEY }}" \
            > ~/.ScreamingFrogSEOSpider/licence.txt
          echo "${{ secrets.SF_MACHINE_ID }}" \
            > ~/.ScreamingFrogSEOSpider/machine-id.txt
          echo '${{ secrets.SF_LEASE_JSON }}' \
            > ~/.ScreamingFrogSEOSpider/lease.json
          printf 'eula.accepted=15\ngsc.auto_connect_account=Nouveau compte 4\n' \
            > ~/.ScreamingFrogSEOSpider/spider.config
          echo '${{ secrets.SF_GSC_CREDENTIALS }}' | base64 -d | tar -xz -C ~/.ScreamingFrogSEOSpider/

      - name: Run crawl
        run: |
          mkdir -p results/${{ env.CRAWL_DATE }}
          CONFIG_FLAG=""
          SF_CONFIG=$(ls config/*.seospiderconfig 2>/dev/null | head -1)
          if [ -n "$SF_CONFIG" ]; then
            CONFIG_FLAG="--config $SF_CONFIG"
            echo "Config SF dÃĐtectÃĐe : $SF_CONFIG"
          else
            echo "Pas de config SF â crawl avec paramÃĻtres par dÃĐfaut"
          fi
          screamingfrogseospider \
            --headless \
            $CONFIG_FLAG \
            --crawl https://almapay.com/ \
            --export-tabs "Internal:All" \
            --save-report "Crawl Overview,Issues Overview" \
            --overwrite \
            --output-folder results/${{ env.CRAWL_DATE }}
          echo "Fichiers produits :"
          ls results/${{ env.CRAWL_DATE }}/

      - name: Transpose crawl overview
        run: |
          python3 pipeline/transpose.py \
            "${{ env.CRAWL_DATE }}" \
            "results/${{ env.CRAWL_DATE }}/crawl_overview.csv" \
            "results/${{ env.CRAWL_DATE }}/issues_overview_report.csv" \
            "results/crawl_history.csv"

      - name: Copy to latest
        run: |
          mkdir -p results/latest
          cp "results/${{ env.CRAWL_DATE }}/internal_all.csv"           results/latest/internal_all.csv
          cp "results/${{ env.CRAWL_DATE }}/crawl_overview.csv"         results/latest/crawl_overview.csv
          cp "results/${{ env.CRAWL_DATE }}/issues_overview_report.csv" results/latest/issues_overview_report.csv

      - name: Commit crawl results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add results/
          git commit -m "crawl SF ${{ env.CRAWL_DATE }}" || echo "rien de nouveau"
          git push

  # ââ Job 2 : analyse IA + email (dÃĐcouplÃĐ du crawl) âââââââââââââââââââââââââââ
  notify:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (aprÃĻs commit du crawl)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: AI Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 pipeline/ai_analysis.py \
            "${{ needs.crawl.outputs.crawl_date }}" \
            "results/latest/crawl_overview.csv" \
            "results/latest/issues_overview_report.csv" \
            "results/crawl_history.csv" \
            "results/latest/ai_analysis.json"

      - name: Commit AI analysis
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add results/latest/ai_analysis.json
          git commit -m "AI analysis ${{ needs.crawl.outputs.crawl_date }}" || echo "rien de nouveau"
          git push

      - name: Send email report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO:        ${{ secrets.MAIL_TO }}
          MAIL_FROM:      SEO Report <noreply@mail.spilou.com>
          CRAWL_URL:      https://almapay.com/
          DASHBOARD_URL:  https://willotalexispro.github.io/sanity-check-almapay/
        run: |
          python3 pipeline/send_report.py "results/latest/ai_analysis.json"

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CRAWL_URL:         https://almapay.com/
          DASHBOARD_URL:     https://willotalexispro.github.io/sanity-check-almapay/
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os, re

          with open("results/latest/ai_analysis.json") as f:
              data = json.load(f)

          crawl_date    = data.get("crawl_date", "")
          summary       = data.get("summary", "")
          site          = os.environ.get("CRAWL_URL", "")
          dashboard_url = os.environ.get("DASHBOARD_URL", "")

          def md_to_mrkdwn(text):
              """Convertit markdown basique en mrkdwn Slack."""
              lines = text.split('\n')
              out = []
              for line in lines:
                  l = line.strip()
                  if re.match(r'^#{1,3} ', l):
                      l = '*' + re.sub(r'^#{1,3} ', '', l) + '*'
                  l = re.sub(r'\*\*(.+?)\*\*', r'*\1*', l)
                  out.append(l)
              return '\n'.join(out)

          mrkdwn = md_to_mrkdwn(summary)
          # Slack limite les blocs section Ã  3000 caractÃĻres
          chunks = [mrkdwn[i:i+2900] for i in range(0, len(mrkdwn), 2900)]

          blocks = [
              {
                  "type": "header",
                  "text": {"type": "plain_text", "text": f"Rapport SEO {site} â {crawl_date}"}
              },
              {"type": "divider"},
          ]
          for chunk in chunks:
              blocks.append({
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": chunk}
              })
          blocks.append({
              "type": "actions",
              "elements": [{
                  "type": "button",
                  "text": {"type": "plain_text", "text": "Voir l'analyse complÃĻte â"},
                  "url": dashboard_url
              }]
          })

          payload = json.dumps({"blocks": blocks}).encode()

          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json", "User-Agent": "sanity-check-seo/1.0"},
          )
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              print(f"Slack OK : {resp.read().decode()}")
          except Exception as e:
              print(f"Erreur Slack (non bloquant) : {e}")
          PYEOF

  # ââ Job 3 : gÃĐnÃĐration PPTX + envoi n8n (optionnel) âââââââââââââââââââââââââ
  deck:
    needs: crawl
    if: ${{ inputs.generate_deck == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CRAWL_DATE: ${{ needs.crawl.outputs.crawl_date }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PPTX
        run: |
          OVERVIEW="results/${{ env.CRAWL_DATE }}/crawl_overview.csv"
          if [ ! -f "$OVERVIEW" ]; then
            echo "crawl_overview.csv introuvable, skip"
            exit 0
          fi
          npm ci --prefix pipeline --silent
          PREV_DATE=$(ls results/ | grep "^20" | grep -v "${{ env.CRAWL_DATE }}" | sort | tail -1)
          PPTX_OUT="results/${{ env.CRAWL_DATE }}/deck_${{ env.CRAWL_DATE }}.pptx"
          if [ -n "$PREV_DATE" ] && [ -f "results/$PREV_DATE/crawl_overview.csv" ]; then
            echo "GÃĐnÃĐration avec comparaison vs $PREV_DATE"
            node pipeline/generate.js \
              --current  "$OVERVIEW" \
              --previous "results/$PREV_DATE/crawl_overview.csv" \
              --config   pipeline/configs/almapay.json \
              --output   "$PPTX_OUT"
          else
            echo "GÃĐnÃĐration baseline (sans comparaison W-o-W)"
            node pipeline/generate.js \
              --current "$OVERVIEW" \
              --config  pipeline/configs/almapay.json \
              --output  "$PPTX_OUT"
          fi
          echo "PPTX_PATH=$PPTX_OUT" >> $GITHUB_ENV

      - name: Commit PPTX
        run: |
          if [ -z "$PPTX_PATH" ] || [ ! -f "$PPTX_PATH" ]; then exit 0; fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add "$PPTX_PATH"
          git commit -m "deck SF ${{ env.CRAWL_DATE }}" || echo "rien de nouveau"
          git push

      - name: Send PPTX to n8n
        run: |
          if [ -z "$PPTX_PATH" ] || [ ! -f "$PPTX_PATH" ]; then exit 0; fi
          python3 << 'PYEOF'
          import base64, json, urllib.request, os
          pptx_path  = os.environ['PPTX_PATH']
          crawl_date = os.environ['CRAWL_DATE']
          with open(pptx_path, 'rb') as f:
              content = base64.b64encode(f.read()).decode()
          payload = json.dumps({
              'filename': f'Crawl Overview AlmaPay - {crawl_date}.pptx',
              'content':  content,
          }).encode()
          req = urllib.request.Request(
              'https://n8n.spilou.com/webhook/44f8feb9-f516-43ce-aacc-e12729743ca8',
              data=payload,
              headers={'Content-Type': 'application/json', 'User-Agent': 'sanity-check-seo/1.0'},
          )
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              print(f"OK n8n : {resp.read().decode()}")
          except Exception as e:
              print(f"Erreur n8n (non bloquant) : {e}")
          PYEOF
